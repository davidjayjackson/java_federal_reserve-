<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="FRED for LibreOffice Calc social preview">
  <defs>
    <linearGradient id="bbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E2A57"/>
      <stop offset="0.55" stop-color="#123B7A"/>
      <stop offset="1" stop-color="#0B213F"/>
    </linearGradient>
    <linearGradient id="bgold" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#FFB020"/>
      <stop offset="1" stop-color="#FFD65C"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2E86F0"/>
      <stop offset="1" stop-color="#155CBF"/>
    </linearGradient>
    <filter id="bsoft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#03102A" flood-opacity="0.5"/>
    </filter>
    <filter id="bglow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#FFCE55" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1280" height="640" fill="url(#bbg)"/>

  <!-- faint full-width chart motif -->
  <g opacity="0.10">
    <polyline points="0,470 160,410 320,435 480,330 640,370 800,255 960,300 1120,150 1280,110"
              fill="none" stroke="#7FB0F5" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  </g>
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
  </g>

  <!-- centered logo tile -->
  <g filter="url(#bsoft)">
    <rect x="530" y="120" width="220" height="220" rx="48" fill="url(#tile)"/>
    <rect x="530" y="120" width="220" height="220" rx="48" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="2"/>
  </g>
  <!-- axes: x 570..714, y 158..262 -->
  <g stroke="#DCE9FB" stroke-opacity="0.85" stroke-width="3" stroke-linecap="round">
    <line x1="570" y1="158" x2="570" y2="262"/>
    <line x1="570" y1="262" x2="714" y2="262"/>
  </g>
  <path d="M581 244 L614 215 L647 227 L680 182 L712 162"
        fill="none" stroke="url(#bgold)" stroke-width="7"
        stroke-linecap="round" stroke-linejoin="round" filter="url(#bglow)"/>
  <g fill="#ffffff">
    <circle cx="581" cy="244" r="4.5"/>
    <circle cx="614" cy="215" r="4.5"/>
    <circle cx="647" cy="227" r="4.5"/>
    <circle cx="680" cy="182" r="4.5"/>
    <circle cx="712" cy="162" r="5.5"/>
  </g>
  <text x="640" y="315" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="44" font-weight="800" letter-spacing="2" fill="#ffffff">FRED</text>

  <!-- headline -->
  <text x="640" y="420" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="60" font-weight="800" fill="#ffffff">FRED for LibreOffice Calc</text>
  <text x="640" y="464" text-anchor="middle"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="26" font-weight="500" fill="#AFC8EE">Federal Reserve economic data, straight into your spreadsheet cells.</text>

  <!-- function chips, centered -->
  <g font-family="'Consolas','SF Mono',Menlo,monospace" font-size="22" font-weight="600">
    <g>
      <rect x="391" y="508" width="176" height="44" rx="22" fill="#ffffff" fill-opacity="0.08" stroke="#FFD65C" stroke-opacity="0.5" stroke-width="1.5"/>
      <text x="479" y="536" text-anchor="middle" fill="#FFD65C">FRED_SERIES</text>
    </g>
    <g>
      <rect x="583" y="508" width="150" height="44" rx="22" fill="#ffffff" fill-opacity="0.08" stroke="#FFD65C" stroke-opacity="0.5" stroke-width="1.5"/>
      <text x="658" y="536" text-anchor="middle" fill="#FFD65C">FRED_META</text>
    </g>
    <g>
      <rect x="749" y="508" width="168" height="44" rx="22" fill="#ffffff" fill-opacity="0.08" stroke="#FFD65C" stroke-opacity="0.5" stroke-width="1.5"/>
      <text x="833" y="536" text-anchor="middle" fill="#FFD65C">FRED_LATEST</text>
    </g>
  </g>
</svg>
